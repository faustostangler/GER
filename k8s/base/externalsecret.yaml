apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gercon-creds-sync
  namespace: gercon
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: gercon-secrets
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: arn:aws:secretsmanager:sa-east-1:123456789012:secret:gercon/creds
        property: username
    - secretKey: password
      remoteRef:
        key: arn:aws:secretsmanager:sa-east-1:123456789012:secret:gercon/creds
        property: password
