# ==========================================
# GITHUB ACTIONS CI/CD PIPELINE - FASE 1 (Com Mutmut Hard-Gate)
# ==========================================
name: K8s The Infinite Loop (CI & Security)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write

jobs:
  quality-gate:
    name: Lint, Test & Mutation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Linter & Formatter (Ruff)
        run: uv run ruff check .

      - name: Domain & App Unit Tests
        run: uv run pytest tests/domain tests/application --maxfail=1 --disable-warnings -v
        
      # === CONFIGURAÇÃO ESTRITA DE MUTMUT ===
      # Fallback se não configurado no pyproject.toml: força o alvo no source code 
      - name: Mutation Testing Guard (mutmut)
        run: |
          uv run mutmut run
          # Hard-gate: Aborta a build se a taxa de sobrevivência não for perfeita (Exceção: 0)
          SURVIVORS=$(uv run mutmut results | grep "Survived" | wc -l)
          if [ "$SURVIVORS" -gt "0" ]; then
            echo "❌ Falha SRE de Mutação: $SURVIVORS mutantes sobreviveram! Seus testes não garantem a lógica."
            exit 1
          fi

      - name: Consumer-Driven Contract Tests (CDC)
        run: uv run pytest tests/infrastructure/test_gercon_contract.py

  security-scan:
    name: Shift-Left Vulnerability Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Audit Dependencies
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          uvx pip-audit -r requirements.txt

  deploy-cloud-run:
    name: Build & Deploy to Cloud Run
    # HARD-GATE: O deploy só acontece se os testes e a auditoria passarem!
    needs: [quality-gate, security-scan] 
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        env:
          # O caminho completo do nosso Registry criado no GCP
          REGISTRY: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gercon-repo
          IMAGE_NAME: gercon-analytics
          # Usa o SHA do commit para garantir rastreabilidade SRE (saber exatamente qual código está em prod)
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:latest -t $REGISTRY/$IMAGE_NAME:$IMAGE_TAG .
          docker push $REGISTRY/$IMAGE_NAME --all-tags

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: gercon-analytics
          image: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gercon-repo/gercon-analytics:${{ github.sha }}
          region: southamerica-east1
          flags: '--allow-unauthenticated' # Torna a URL pública
