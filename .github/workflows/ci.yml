# ==========================================
# GITHUB ACTIONS CI/CD PIPELINE - FASE 1 (Com Mutmut Hard-Gate)
# ==========================================
name: K8s The Infinite Loop (CI & Security)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  quality-gate:
    name: Lint, Test & Mutation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Linter & Formatter (Ruff)
        run: uv run ruff check .

      - name: Domain & App Unit Tests
        run: uv run pytest tests/domain tests/application --maxfail=1 --disable-warnings -v
        
      # === CONFIGURAÇÃO ESTRITA DE MUTMUT ===
      # Fallback se não configurado no pyproject.toml: força o alvo no source code 
      - name: Mutation Testing Guard (mutmut)
        run: |
          uv run mutmut run --paths-to-mutate src/domain/ --tests-dir tests/domain/ || true
          # Hard-gate: Aborta a build se a taxa de sobrevivência não for perfeita (Exceção: 0)
          SURVIVORS=$(uv run mutmut results | grep "Survived" | wc -l)
          if [ "$SURVIVORS" -gt "0" ]; then
            echo "❌ Falha SRE de Mutação: $SURVIVORS mutantes sobreviveram! Seus testes não garantem a lógica."
            exit 1
          fi

      - name: Consumer-Driven Contract Tests (CDC)
        run: uv run pytest tests/infrastructure/test_gercon_contract.py

  security-scan:
    name: Shift-Left Vulnerability Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Dependency Audit
        run: uv pip compile pyproject.toml | uv pip audit
