# --- SOTA DOCKER COMPOSE: Modular Monolith orchestration ---

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  # Analytics Layer (Presentation BFF & Primary Runtime)
  analytics:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_${ANALYTICS_SERVICE_NAME:-analytics}
    env_file:
      - env/creds.env
      - env/config.env
    environment:
      - RDE_ACCESS_TOKEN=${RDE_ACCESS_TOKEN:-}
      - ROLE=analytics
    networks:
      - ger-infra-mesh
      - iap-mesh
    ports:
      - "6080:6080"   # noVNC Browser Access
      - "50051:50051" # gRPC Service-to-Service
    volumes:
      - ./src:/app/src
      - ./app_analytics.py:/app/app_analytics.py
      - ./gercon_raw_data.db:/app/gercon_raw_data.db
      - ./gercon_consolidado.parquet:/app/gercon_consolidado.parquet
    restart: ${DOCKER_RESTART_POLICY:-unless-stopped}
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${ANALYTICS_MEM_LIMIT:-2G}'
        reservations:
          memory: '${ANALYTICS_MEM_RESERVATION:-512M}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/dashboard/_stcore/health"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}
      start_period: 30s

  # SRE: Router de Borda Interno para lidar com Redirecionamentos de Root (/) 
  router:
    image: nginx:alpine
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_router
    networks:
      - ger-infra-mesh
      - iap-mesh
    volumes:
      - ./infra/router/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      analytics:
        condition: service_healthy
    logging: *default-logging

  # --- SRE FIX: Redis Session Store para suportar JWTs gigantes do Keycloak ---
  redis-session:
    image: ${REDIS_IMAGE_NAME:-redis}:${REDIS_IMAGE_VERSION:-7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_redis_session
    profiles: ["iam"]
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${REDIS_SESSION_MEM_LIMIT:-512M}'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  oauth2-proxy:
    image: ${OAUTH2_PROXY_IMAGE_NAME:-quay.io/oauth2-proxy/oauth2-proxy}:${OAUTH2_PROXY_IMAGE_VERSION:-v7.6.0}
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_proxy
    profiles: ["iam"]
    ports:
      - "${DOCKER_BIND_IP:-127.0.0.1}:${OAUTH2_PROXY_EXTERNAL_PORT:-4180}:${OAUTH2_PROXY_INTERNAL_PORT:-4180}"  
    env_file:
      - env/creds.env
      - env/config.env
    environment:
      OAUTH2_PROXY_PROVIDER: "keycloak-oidc"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:${OAUTH2_PROXY_INTERNAL_PORT:-4180}"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"  # TODO (Day2/Prod): Restringir ao domínio do hospital
      OAUTH2_PROXY_REDIRECT_URL: "http://${EXTERNAL_DOMAIN:-127.0.0.1.nip.io}/oauth2/callback"
      # SRE: Compatibilidade com Keycloak defaults
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_OIDC_EXTRA_AUDIENCES: "account"
      # SRE: As variáveis de Split-Horizon DNS (LOGIN_URL, REDEEM_URL, JWKS_URL, VALIDATE_URL) 
      # foram movidas para o env/config.env para evitar interpolação precoce e permitir o Fix manual.
      # Integração com Redis
      OAUTH2_PROXY_SESSION_STORE_TYPE: "redis"
      OAUTH2_PROXY_REDIS_CONNECTION_URL: "redis://${COMPOSE_PROJECT_NAME:-ger}_redis_session:6379"
      # SRE: Sessão longa de 24h para evitar renovações frequentes em uso clínico
      OAUTH2_PROXY_COOKIE_EXPIRE: "24h0m0s"
      OAUTH2_PROXY_COOKIE_REFRESH: "0h"
    command:
      - --cookie-domain=.${PROJECT_DOMAIN} # O ponto no início permite todos os subdomínios
      - --oidc-issuer-url=http://keycloak:8080/realms/${KEYCLOAK_REALM:-gercon-realm}
      - --whitelist-domain=.${PROJECT_DOMAIN}
      - --cookie-expire=24h0m0s
      - --cookie-refresh=0h
    logging: *default-logging
    depends_on:
      redis-session:
        condition: service_healthy
      keycloak:
        condition: service_healthy # SRE FIX: Aguarda o Keycloak estar 'Listening' na 8080 (OIDC Discovery)
      router:
        condition: service_started
    networks:
      - iap-mesh
      - ger-infra-mesh 

  # ----------------------------------------------------
  # Event Streaming (SOTA Redpanda, Thread-per-core)
  # ----------------------------------------------------
  redpanda-0:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_IMAGE_VERSION:-latest}
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_event_bus
    networks:
      - ger-infra-mesh
    ports:
      - "0.0.0.0:19092:19092"
      - "0.0.0.0:19644:9644"
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 400M
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-0:9092,external://${EXTERNAL_DOMAIN:-127.0.0.1.nip.io}:19092
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '512M'
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 10

  # ----------------------------------------------------
  # Async Processing Queue (SOTA Resiliency with Arq)
  # ----------------------------------------------------
  redis-queue:
    image: ${REDIS_IMAGE_NAME:-redis}:${REDIS_IMAGE_VERSION:-7-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_redis_queue
    networks:
      - ger-infra-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${REDIS_QUEUE_MEM_LIMIT:-512M}'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  worker:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_arq_worker
    env_file:
      - env/creds.env
      - env/config.env
    environment:
      - RDE_ACCESS_TOKEN=${RDE_ACCESS_TOKEN:-}
      - ROLE=worker
    networks:
      - ger-infra-mesh
    volumes:
      - ./gercon_raw_data.db:/app/gercon_raw_data.db
      - ./gercon_consolidado.parquet:/app/gercon_consolidado.parquet
    depends_on:
      redis-queue:
        condition: service_healthy
    restart: "on-failure"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${WORKER_MEM_LIMIT:-2G}'
    ports:
      - "${DOCKER_BIND_IP:-127.0.0.1}:8000:8000"  # SRE: Exposição da telemetria Prometheus
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=8000"
      - "prometheus.io/path=/metrics"

  # ----------------------------------------------------
  # Identity Access Management (IAM) - Profile: "iam"
  # ----------------------------------------------------
  # 1. Banco de Dados do Keycloak (Stateful)
  postgres-keycloak:
    image: ${POSTGRES_IMAGE_NAME:-postgres}:${POSTGRES_IMAGE_VERSION:-16-alpine}
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_keycloak_db
    profiles: ["iam"]
    env_file:
      - env/creds.env
      - env/config.env
    # POSTGRES_DB, POSTGRES_USER e POSTGRES_PASSWORD já injetados via env/creds.env e env/config.env
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${KEYCLOAK_DB_MEM_LIMIT:-1G}'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-keycloak} -d $${POSTGRES_DB:-keycloak}"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-3}

  # 2. Servidor de Identidade (Keycloak)
  keycloak:
    image: ${KEYCLOAK_IMAGE_NAME:-quay.io/keycloak/keycloak}:${KEYCLOAK_IMAGE_VERSION:-24.0.2}
    container_name: ${COMPOSE_PROJECT_NAME:-ger}_keycloak
    profiles: ["iam"]
    # SRE FIX: Importação declarativa do estado do Realm (IaC)
    command: start-dev --import-realm
    env_file:
      - env/creds.env
      - env/config.env
    environment:
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_PORT: 8080        # Importante para manter a porta no redirecionamento
      # --- SRE FIX: Edge Identity & Split-Horizon DNS ---
      KC_HOSTNAME_URL: "${PROTOCOL}://${IAM_SUBDOMAIN}:8080"
      KC_HOSTNAME_ADMIN_URL: "${PROTOCOL}://${IAM_SUBDOMAIN}:8080"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false" # Permite que chamadas de backend continuem usando 'http://keycloak'
    volumes:
      - ./infra/identity/gercon-realm-export.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      # SRE: Exposto temporariamente para o setup administrativo
      - "${DOCKER_BIND_IP:-127.0.0.1}:${KEYCLOAK_EXTERNAL_PORT:-8080}:${KEYCLOAK_INTERNAL_PORT:-8080}"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      iap-mesh:
        aliases:
          - iam.127.0.0.1.nip.io # SRE: Hack de DNS Interno para Analytics e Proxy acharem o IdP
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${KEYCLOAK_MEM_LIMIT:-2G}'
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET /health/live HTTP/1.1\r\nhost: 127.0.0.1.nip.io\r\nConnection: close\r\n\r\n\" >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 2s
      timeout: 2s
      retries: 60
      start_period: 300s  # SRE: Acomoda a criação massiva de tabelas no DB em cold boots

networks:
  ger-infra-mesh:
    name: ${COMPOSE_PROJECT_NAME:-ger}_${INFRA_NETWORK_NAME:-infra-mesh}
  iap-mesh:
    name: ${COMPOSE_PROJECT_NAME:-ger}_${IAP_NETWORK_NAME:-iap-mesh}

volumes:
  keycloak_data:
    name: ${COMPOSE_PROJECT_NAME:-ger}_keycloak_data
