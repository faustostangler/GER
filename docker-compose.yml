# --- SOTA DOCKER COMPOSE: Modular Monolith orchestration ---

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE}"
    max-file: "${DOCKER_LOG_MAX_FILE}"

services:
  # Analytics Layer (Presentation BFF & Primary Runtime)
  analytics:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME}_${ANALYTICS_SERVICE_NAME}
    env_file:
      - env/creds.env
      - env/config.env
    networks:
      - ger-infra-mesh
      - iap-mesh
    volumes:
      - .:/app
      - /app/.venv  # SRE: Protege o .venv do builder contra o bind mount do host
    command: ["/entrypoint.sh"]
    restart: ${DOCKER_RESTART_POLICY}
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${ANALYTICS_MEM_LIMIT}'
        reservations:
          memory: '${ANALYTICS_MEM_RESERVATION}'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ANALYTICS_INTERNAL_PORT}/dashboard/_stcore/health"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
      start_period: 30s

  # --- SRE FIX: Redis Session Store para suportar JWTs gigantes do Keycloak ---
  redis-session:
    image: ${REDIS_IMAGE_NAME}:${REDIS_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_redis_session
    profiles: ["iam"]
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${REDIS_SESSION_MEM_LIMIT}'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  oauth2-proxy:
    image: ${OAUTH2_PROXY_IMAGE_NAME}:${OAUTH2_PROXY_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_proxy
    profiles: ["iam"]
    ports:
      - "${DOCKER_BIND_IP}:${OAUTH2_PROXY_EXTERNAL_PORT}:${OAUTH2_PROXY_INTERNAL_PORT}"  
    env_file:
      - env/creds.env
    environment:
      OAUTH2_PROXY_PROVIDER: "keycloak-oidc"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:${OAUTH2_PROXY_INTERNAL_PORT}"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"  # TODO (Day2/Prod): Restringir ao domínio do hospital
      OAUTH2_PROXY_REDIRECT_URL: "http://localhost/oauth2/callback"
      # SRE: Compatibilidade com Keycloak defaults
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_OIDC_EXTRA_AUDIENCES: "account"
      # SRE: Split Horizon DNS - Browser via localhost, Backend via Docker DNS
      OAUTH2_PROXY_LOGIN_URL: "http://localhost:8080/realms/gercon-realm/protocol/openid-connect/auth"
      OAUTH2_PROXY_REDEEM_URL: "http://keycloak:8080/realms/gercon-realm/protocol/openid-connect/token"
      OAUTH2_PROXY_OIDC_JWKS_URL: "http://keycloak:8080/realms/gercon-realm/protocol/openid-connect/certs"
      OAUTH2_PROXY_VALIDATE_URL: "http://keycloak:8080/realms/gercon-realm/protocol/openid-connect/userinfo"
      # Integração com Redis
      OAUTH2_PROXY_SESSION_STORE_TYPE: "redis"
      OAUTH2_PROXY_REDIS_CONNECTION_URL: "redis://${COMPOSE_PROJECT_NAME}_redis_session:6379"
    logging: *default-logging
    depends_on:
      redis-session:
        condition: service_healthy
      keycloak:
        condition: service_healthy # SRE FIX: Aguarda o Keycloak estar 'Listening' na 8080 (OIDC Discovery)
    networks:
      - iap-mesh
      - ger-infra-mesh 

  # ----------------------------------------------------
  # Event Streaming (SOTA IAM Sync with KRaft, no Zookeeper)
  # ----------------------------------------------------
  kafka:
    image: ${KAFKA_IMAGE_NAME}:${KAFKA_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_kafka
    networks:
      - ger-infra-mesh
    environment:
      # KRaft Settings (Zookeeper-less)
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${KAFKA_MEM_LIMIT}'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------
  # Async Processing Queue (SOTA Resiliency with Arq)
  # ----------------------------------------------------
  redis-queue:
    image: ${REDIS_IMAGE_NAME}:${REDIS_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_redis_queue
    networks:
      - ger-infra-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${REDIS_QUEUE_MEM_LIMIT}'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME}_arq_worker
    command: ["arq", "src.infrastructure.queue.worker_settings.WorkerConfig"]
    env_file:
      - env/creds.env
      - env/config.env
    networks:
      - ger-infra-mesh
    depends_on:
      redis-queue:
        condition: service_healthy
    restart: "on-failure"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${WORKER_MEM_LIMIT}'

  # ----------------------------------------------------
  # Identity Access Management (IAM) - Profile: "iam"
  # ----------------------------------------------------
  # 1. Banco de Dados do Keycloak (Stateful)
  postgres-keycloak:
    image: ${POSTGRES_IMAGE_NAME}:${POSTGRES_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_keycloak_db
    profiles: ["iam"]
    env_file:
      - env/creds.env
    # POSTGRES_DB, POSTGRES_USER e POSTGRES_PASSWORD já injetados via env/creds.env
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${KEYCLOAK_DB_MEM_LIMIT}'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}

  # 2. Servidor de Identidade (Keycloak)
  keycloak:
    image: ${KEYCLOAK_IMAGE_NAME}:${KEYCLOAK_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_keycloak
    profiles: ["iam"]
    # TODO (Day2/Prod): Trocar start-dev para start quando o Ingress com SSL definitivo for configurado
    command: start-dev 
    env_file:
      - env/creds.env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${COMPOSE_PROJECT_NAME}_keycloak_db:5432/${POSTGRES_DB}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      # SRE: Exposto temporariamente para o setup administrativo
      - "${DOCKER_BIND_IP}:${KEYCLOAK_EXTERNAL_PORT}:${KEYCLOAK_INTERNAL_PORT}"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: '${KEYCLOAK_MEM_LIMIT}'
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e \"GET /health/live HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n\" >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s  # SRE: Quarkus augmentation varia de 40-75s + JVM boot ~10s

networks:
  ger-infra-mesh:
    name: ${COMPOSE_PROJECT_NAME}_${INFRA_NETWORK_NAME}
  iap-mesh:
    name: ${COMPOSE_PROJECT_NAME}_${IAP_NETWORK_NAME}

volumes:
  keycloak_data:
    name: ${COMPOSE_PROJECT_NAME}_keycloak_data
  kafka_data:
    name: ${COMPOSE_PROJECT_NAME}_kafka_data
