# --- SOTA DOCKER COMPOSE: Modular Monolith orchestration ---
# Integrating Ofelia for Docker-Native Job Scheduling (SRE/GitOps Ready)

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "3"

services:
  # Analytics Layer (Presentation BFF & Primary Runtime)
  analytics:
    build: .
    container_name: ger-analytics
    env_file:
      - env/creds.env
      - env/config.env
    networks:
      - ger-infra-mesh
      - iap-mesh
    volumes:
      - .:/app
    command: ["/entrypoint.sh"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/dashboard/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "ofelia.enabled=true"
      - "ofelia.job-run.ger-daily-sync.schedule=0 0 3 * * *"
      - "ofelia.job-run.ger-daily-sync.container=ger-analytics"
      - "ofelia.job-run.ger-daily-sync.command=sh -c 'export HEADLESS=True && python worker.py'"

  # --- SRE FIX: Redis Session Store para suportar JWTs gigantes do Keycloak ---
  redis-session:
    image: redis:7-alpine
    container_name: ger-redis
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: ger-proxy
    ports:
      - "80:4180"  
    env_file:
      - env/creds.env
    environment:
      OAUTH2_PROXY_PROVIDER: "keycloak-oidc"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      # Integração com Redis
      OAUTH2_PROXY_SESSION_STORE_TYPE: "redis"
      OAUTH2_PROXY_REDIS_CONNECTION_URL: "redis://redis-session:6379"
    logging: *default-logging
    depends_on:
      - redis-session
    networks:
      - iap-mesh
      - ger-infra-mesh 

  # Orquestração: Ofelia (SOTA Docker Scheduler)
  # Monitoring Docker Events without external dependencies.
  scheduler:
    image: mcuadros/ofelia:latest
    container_name: ger-scheduler
    depends_on:
      analytics:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    logging: *default-logging

  # 1. Banco de Dados do Keycloak (Stateful)
  postgres-keycloak:
    image: postgres:15-alpine
    container_name: ger-keycloak-db
    env_file:
      - env/creds.env
    environment:
      # POSTGRES_DB, POSTGRES_USER e POSTGRES_PASSWORD injetados via creds.env
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Servidor de Identidade (Keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0 
    container_name: ger-keycloak
    # TODO (Day2/Prod): Trocar start-dev para start quando o Ingress com SSL definitivo for configurado
    command: start-dev 
    env_file:
      - env/creds.env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      # Variáveis injetadas via env_file para maior segurança
      # SRE FIX: Variáveis modernas para Keycloak 24+ (Quarkus)
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      # SRE: Exposto temporariamente para o setup administrativo
      - "8080:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    networks:
      - iap-mesh
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  ger-infra-mesh:
    name: ger-infra-mesh
  iap-mesh:
    name: iap-mesh

volumes:
  keycloak_data:
