server {
    listen 80;
    server_name localhost;

    # WHY: Docker embedded DNS (127.0.0.11) resolve nomes de serviço em runtime,
    # não no startup. Sem isso, nginx tenta resolver 'analytics' e 'oauth2-proxy'
    # ao iniciar — e crasha com exit(1) se os containers ainda não estiverem prontos.
    # valid=10s força re-resolução periódica (container restarts).
    resolver 127.0.0.11 valid=10s;

    # SRE Redirect: Raiz (/) para o Bounded Context do Dashboard
    location = / {
        return 301 http://$host/dashboard;
    }

    # SRE: Rotas do OAuth2-Proxy — DEVE vir antes do block genérico "/"
    # WHY: /oauth2/callback é o endpoint que o Keycloak chama após o login.
    # Sem este block, todos os requests iam para o Streamlit, que retornava 403.
    location /oauth2/ {
        set $upstream_proxy http://oauth2-proxy:4180;
        proxy_pass $upstream_proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy reverso para o serviço Analytics (Streamlit)
    location / {
        set $upstream_analytics http://analytics:8501;
        proxy_pass $upstream_analytics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SRE: Passagem de cabeçalhos de autenticação vindos do OAuth2-Proxy
        proxy_set_header X-Forwarded-Access-Token $http_x_forwarded_access_token;
        proxy_set_header X-Auth-Request-Access-Token $http_x_auth_request_access_token;
        
        # SRE: Suporte para WebSockets (Streamlit exige)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
